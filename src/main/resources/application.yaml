# 日志配置
logging:
  level:
    root: INFO
    com.grass.grassaiagent: INFO
    com.grass.grassaiagent.advisor: DEBUG
    org.springframework.ai: INFO
  file:
    name: ./logs/grass-ai-agent.log

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false

server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.grass.grassaiagent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# searchApi
search-api:
  api-key: ENC(AKzEI01mGuuqNfkhYCyA1qhTpZYmtulsFZvnVFuljMVETz18lumEJyIRN6nl81aMsFtwJIKiXN61kKVRFLgQog==)
  api-url: https://www.searchapi.io/api/v1/search

# Jasypt 配置加密（密钥通过环境变量 JASYPT_ENCRYPTOR_PASSWORD 传入，开发环境使用默认值）
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:grass-ai-agent-secret-2026}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

